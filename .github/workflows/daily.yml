name: Daily Flight Price Check

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 한국시간 오전 8시
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run flight tracker
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          TZ: Asia/Seoul
        run: python track_flights.py
      
      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flight_prices.csv
          git diff --staged --quiet || git commit -m "📊 Update prices $(TZ='Asia/Seoul' date +'%Y-%m-%d')"
          git push
